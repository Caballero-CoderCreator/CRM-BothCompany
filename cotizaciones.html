<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotizaciones — CRM Both Company</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <nav class="nav">
    <a href="/dashboard.html" class="nav-brand">Both Company</a>
    <a href="/clientes.html">Clientes</a>
    <a href="/cotizaciones.html" class="active">Cotizaciones</a>
    <div class="nav-spacer"></div>
    <span class="nav-user" id="nav-user-email"></span>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Cotizaciones</h1>
      <a href="/cotizacion-nueva.html" class="btn btn-primary">+ Nueva cotización</a>
    </div>

    <div class="table-container">
      <div class="table-toolbar">
        <div class="filtros">
          <button class="filtro-btn active" data-estado="todas" onclick="aplicarFiltro('todas')">Todas</button>
          <button class="filtro-btn" data-estado="borrador" onclick="aplicarFiltro('borrador')">Borrador</button>
          <button class="filtro-btn" data-estado="enviada" onclick="aplicarFiltro('enviada')">Enviada</button>
          <button class="filtro-btn" data-estado="aprobada" onclick="aplicarFiltro('aprobada')">Aprobada</button>
          <button class="filtro-btn" data-estado="en_produccion" onclick="aplicarFiltro('en_produccion')">En producción</button>
          <button class="filtro-btn" data-estado="entregada" onclick="aplicarFiltro('entregada')">Entregada</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>N°</th>
            <th>Cliente</th>
            <th>Total</th>
            <th>Estado</th>
            <th>Cambiar estado</th>
          </tr>
        </thead>
        <tbody id="tabla-cotizaciones">
          <tr><td colspan="5" class="loading">Cargando cotizaciones...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cotizaciones.js"></script>
  <script>
    async function init() {
      const session = await requireAuth()
      if (!session) return
      await mostrarUsuario()
      await cargarCotizaciones()
    }
    init()
  </script>
</body>
</html>
