<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — CRM Both Company</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">Both Company</div>
      <div class="login-sub" id="subtitulo">Verificando enlace...</div>
      <div id="form-reset" style="display:none">
        <div class="form-group">
          <label>Nueva contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" id="password2" placeholder="Repetir contraseña">
        </div>
        <button class="btn btn-primary btn-login" onclick="cambiarPassword()">Guardar contraseña</button>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function iniciar() {
      // Leer tokens directamente del hash del URL
      const hash = window.location.hash.substring(1)
      const params = new URLSearchParams(hash)
      const accessToken = params.get('access_token')
      const refreshToken = params.get('refresh_token')
      const tipo = params.get('type')

      if (accessToken) {
        // Establecer sesión manualmente con el token
        const { error } = await db.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken || ''
        })

        if (error) {
          document.getElementById('subtitulo').textContent = 'Enlace inválido o expirado'
          document.getElementById('error-msg').textContent = 'Por favor solicita un nuevo enlace de recuperación.'
          document.getElementById('error-msg').classList.add('visible')
          return
        }

        document.getElementById('subtitulo').textContent = 'Crear nueva contraseña'
        document.getElementById('form-reset').style.display = 'block'
      } else {
        document.getElementById('subtitulo').textContent = 'Enlace inválido'
        document.getElementById('error-msg').textContent = 'Este enlace no es válido. Solicita uno nuevo desde Supabase.'
        document.getElementById('error-msg').classList.add('visible')
      }
    }

    async function cambiarPassword() {
      const password = document.getElementById('password').value
      const password2 = document.getElementById('password2').value
      const errorEl = document.getElementById('error-msg')
      errorEl.classList.remove('visible')

      if (password.length < 6) {
        errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres'
        errorEl.classList.add('visible')
        return
      }
      if (password !== password2) {
        errorEl.textContent = 'Las contraseñas no coinciden'
        errorEl.classList.add('visible')
        return
      }

      const { error } = await db.auth.updateUser({ password })
      if (error) {
        errorEl.textContent = 'Error: ' + error.message
        errorEl.classList.add('visible')
        return
      }

      await db.auth.signOut()
      alert('Contraseña guardada. Ahora inicia sesión.')
      window.location.href = '/index.html'
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') cambiarPassword()
    })

    iniciar()
  </script>
</body>
</html>
