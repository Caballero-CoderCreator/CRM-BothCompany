<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — CRM Both Company</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">Both Company</div>
      <div class="login-sub" id="subtitulo">Verificando enlace...</div>
      <div id="form-reset" style="display:none">
        <div class="form-group">
          <label>Nueva contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" id="password2" placeholder="Repetir contraseña">
        </div>
        <button class="btn btn-primary btn-login" onclick="cambiarPassword()">Guardar contraseña</button>
      </div>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    function mostrarFormulario() {
      document.getElementById('subtitulo').textContent = 'Crear nueva contraseña'
      document.getElementById('form-reset').style.display = 'block'
    }

    function mostrarError(msg) {
      document.getElementById('subtitulo').textContent = 'Enlace inválido o expirado'
      const el = document.getElementById('error-msg')
      el.textContent = msg
      el.classList.add('visible')
    }

    async function iniciar() {
      try {
        // Opción 1: PKCE flow — Supabase nuevo usa ?code= en la URL
        const queryParams = new URLSearchParams(window.location.search)
        const code = queryParams.get('code')
        if (code) {
          const { error } = await db.auth.exchangeCodeForSession(code)
          if (!error) { mostrarFormulario(); return }
        }

        // Opción 2: Implicit flow — token en el hash #access_token=
        const hashParams = new URLSearchParams(window.location.hash.substring(1))
        const accessToken = hashParams.get('access_token')
        const refreshToken = hashParams.get('refresh_token')
        if (accessToken) {
          const { error } = await db.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken || ''
          })
          if (!error) { mostrarFormulario(); return }
        }

        // Opción 3: El SDK ya procesó el token y hay sesión activa
        const { data: { session } } = await db.auth.getSession()
        if (session) { mostrarFormulario(); return }

        mostrarError('Este enlace expiró. Solicita uno nuevo desde Supabase.')

      } catch (err) {
        mostrarError('Error inesperado: ' + err.message)
      }
    }

    // También escuchar el evento del SDK por si llega después
    db.auth.onAuthStateChange((event, session) => {
      if ((event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') && session) {
        mostrarFormulario()
      }
    })

    async function cambiarPassword() {
      const password = document.getElementById('password').value
      const password2 = document.getElementById('password2').value
      const errorEl = document.getElementById('error-msg')
      errorEl.classList.remove('visible')

      if (password.length < 6) {
        errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres'
        errorEl.classList.add('visible')
        return
      }
      if (password !== password2) {
        errorEl.textContent = 'Las contraseñas no coinciden'
        errorEl.classList.add('visible')
        return
      }

      const { error } = await db.auth.updateUser({ password })
      if (error) {
        errorEl.textContent = 'Error al guardar: ' + error.message
        errorEl.classList.add('visible')
        return
      }

      await db.auth.signOut()
      alert('Contraseña guardada correctamente. Ahora inicia sesión.')
      window.location.href = '/index.html'
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') cambiarPassword()
    })

    iniciar()
  </script>
</body>
</html>
