<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — CRM Both Company</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">Both Company</div>
      <div class="login-sub">Crear nueva contraseña</div>
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="password2" placeholder="Repetir contraseña">
      </div>
      <button class="btn btn-primary btn-login" onclick="cambiarPassword()">Guardar contraseña</button>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function cambiarPassword() {
      const password = document.getElementById('password').value
      const password2 = document.getElementById('password2').value
      const errorEl = document.getElementById('error-msg')
      errorEl.classList.remove('visible')

      if (password.length < 6) {
        errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres'
        errorEl.classList.add('visible')
        return
      }
      if (password !== password2) {
        errorEl.textContent = 'Las contraseñas no coinciden'
        errorEl.classList.add('visible')
        return
      }

      const { error } = await db.auth.updateUser({ password })
      if (error) {
        errorEl.textContent = 'Error: ' + error.message
        errorEl.classList.add('visible')
        return
      }

      alert('Contraseña actualizada. Ahora puedes iniciar sesión.')
      window.location.href = '/index.html'
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') cambiarPassword()
    })
  </script>
</body>
</html>
