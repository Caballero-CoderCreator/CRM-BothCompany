<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — CRM Both Company</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">Both Company</div>
        <div class="sidebar-role">CRM Executive</div>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item"><span class="nav-icon">⊞</span> Dashboard</a>
        <a href="/clientes.html" class="nav-item"><span class="nav-icon">👤</span> Clientes</a>
        <a href="/cotizaciones.html" class="nav-item"><span class="nav-icon">📋</span> Cotizaciones</a>
        <a href="/pedidos.html" class="nav-item active"><span class="nav-icon">📦</span> Pedidos</a>
        <a href="/catalogo.html" class="nav-item"><span class="nav-icon">🗂️</span> Catálogo</a>
      </nav>
      <div class="sidebar-bottom">
        <a href="/cotizacion-nueva.html" class="btn btn-primary sidebar-cta">+ Nueva cotización</a>
        <a href="#" class="nav-item-small"><span class="nav-icon">❓</span> Ayuda</a>
        <a href="#" class="nav-item-small"><span class="nav-icon">⚙</span> Configuración</a>
      </div>
    </aside>
    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-tabs">
          <a href="/dashboard.html" class="tab-link">Dashboard</a>
          <a href="/clientes.html" class="tab-link">Clientes</a>
          <a href="/cotizaciones.html" class="tab-link">Cotizaciones</a>
          <a href="/pedidos.html" class="tab-link active">Pedidos</a>
        </div>
        <div class="topbar-right">
          <span class="nav-user" id="nav-user-email"></span>
          <button class="btn-logout" onclick="logout()">Salir</button>
        </div>
      </header>

  <div class="page">
    <div class="page-header">
      <h1 class="page-title">Pedidos</h1>
    </div>

    <div class="table-container">
      <div class="table-toolbar">
        <div class="filtros">
          <button class="filtro-btn active" data-estado="todos" onclick="aplicarFiltroPedido('todos')">Todos</button>
          <button class="filtro-btn" data-estado="pendiente" onclick="aplicarFiltroPedido('pendiente')">Pendiente</button>
          <button class="filtro-btn" data-estado="en_produccion" onclick="aplicarFiltroPedido('en_produccion')">En producción</button>
          <button class="filtro-btn" data-estado="listo" onclick="aplicarFiltroPedido('listo')">Listo</button>
          <button class="filtro-btn" data-estado="entregado" onclick="aplicarFiltroPedido('entregado')">Entregado</button>
          <button class="filtro-btn" data-estado="pagado" onclick="aplicarFiltroPedido('pagado')">Pagado</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>N° Pedido</th>
            <th>Cliente</th>
            <th>Total</th>
            <th>Estado</th>
            <th>Cambiar estado</th>
          </tr>
        </thead>
        <tbody id="tabla-pedidos">
          <tr><td colspan="5" class="loading">Cargando pedidos...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pedidos.js"></script>
  <script>
    async function init() {
      const session = await requireAuth()
      if (!session) return
      await mostrarUsuario()
      await cargarPedidos()
    }
    init()
  </script>
</body>
</html>
